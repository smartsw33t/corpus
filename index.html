<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil Text Summarizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 20px;
        }

        .section {
            display: flex;
            flex-direction: column;
        }

        .section-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 16px;
        }

        textarea {
            width: 100%;
            min-height: 400px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Noto Sans Tamil', Arial, sans-serif;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea::placeholder {
            color: #999;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }

        .btn-summarize {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-summarize:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-summarize:active {
            transform: translateY(0);
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .btn-copy {
            background: #f0f0f0;
            color: #333;
            flex: 0.5;
        }

        .btn-copy:hover {
            background: #e0e0e0;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 13px;
            color: #666;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            color: #999;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            color: #667eea;
            font-weight: 600;
            font-size: 16px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-size: 14px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c00;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #c00;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #efe;
            color: #0a0;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #0a0;
            display: none;
            font-size: 13px;
        }

        .success.show {
            display: block;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .layout {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            textarea {
                min-height: 300px;
            }

            h1 {
                font-size: 22px;
            }

            .button-group {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tamil Text Summarizer</h1>
        <p class="subtitle">Input Tamil text • Get intelligent summary at 10% length with corpus humanization</p>

        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>

        <div class="button-group">
            <button class="btn-summarize" id="summarizeBtn">Summarize</button>
            <button class="btn-clear" id="clearBtn">Clear All</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div> Processing...
        </div>

        <div class="layout">
            <div class="section">
                <div class="section-title">Input Tamil Text</div>
                <textarea 
                    id="inputText" 
                    placeholder="Paste your Tamil text here..."></textarea>
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">Characters</span>
                        <span class="stat-value" id="inputCharCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Words</span>
                        <span class="stat-value" id="inputWordCount">0</span>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Summarized Output</div>
                <textarea 
                    id="outputText" 
                    placeholder="Summary will appear here..." 
                    readonly></textarea>
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">Characters</span>
                        <span class="stat-value" id="outputCharCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Words</span>
                        <span class="stat-value" id="outputWordCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Compression</span>
                        <span class="stat-value" id="compressionRatio">0%</span>
                    </div>
                </div>
                <button class="btn-copy" id="copyBtn" style="margin-top: 10px;">Copy Summary</button>
            </div>
        </div>
    </div>

    <script src="summarizer.js"></script>
</body>
</html>
